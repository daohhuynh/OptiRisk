services:
  optirisk-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: optirisk-backend
    ports:
      - "8080:8080"
    # Note: 9090 is for internal UDP multicast, usually doesn't need external exposure
    # unless connecting from a different host on the network.
    expose:
      - "9090"
    restart: unless-stopped
    # Optimization for HFT-style threading
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Dedalus configuration for performance isolation
    cpus: 3
    mem_limit: 2g
