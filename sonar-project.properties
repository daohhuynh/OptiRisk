# ============================================================================
# SonarQube Cloud Project Configuration
# ============================================================================

# Project Metadata
sonar.projectKey=optirisk
sonar.projectName=OptiRisk
sonar.projectVersion=1.0

# Path to Sources (Relative to the project base directory)
sonar.sources=frontend/app,frontend/components,frontend/lib,backend/src

# Exclusions
sonar.exclusions=node_modules/**,.next/**,backend/build/**,backend/vendor/**,optirisk_initial_state.json,optirisk_memory.bin

# ── C++ Configuration ────────────────────────────────────────────────────────
# Analyzing C++ requires a high-fidelity build wrapper or explicit include paths.
sonar.cpp.std=c++23
sonar.cpp.compilerArgs=-mavx2 -pthread -O3
sonar.cfamily.build-wrapper-output.bypass=true

# ── TypeScript/JavaScript Configuration ───────────────────────────────────────
sonar.javascript.environments=browser,node
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# ── Performance & Quality Profiles ───────────────────────────────────────────
sonar.leak.period=30
sonar.qualitygate.wait=true
